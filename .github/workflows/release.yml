name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── AppImage: built on the oldest base (22.04/jammy) so the single,
  #    self-contained image runs on BOTH Lliurex 23 (jammy, glibc 2.35)
  #    and Lliurex 25 (noble, glibc 2.39) via forward glibc
  #    compatibility. Bundles Qt 6.2.4. ──
  appimage:
    runs-on: ubuntu-22.04
    env:
      DISTRO_SUFFIX: jammy
    steps:
      - uses: actions/checkout@v4

      - name: Compute version from tag
        id: ver
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Qt6 and build dependencies (system)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build pkg-config wget ca-certificates build-essential \
            libbluetooth-dev libxkbcommon-dev libgl1-mesa-dev \
            squashfs-tools \
            qt6-base-dev qt6-declarative-dev qt6-connectivity-dev qt6-wayland libqt6opengl6-dev qt6-tools-dev \
            nlohmann-json3-dev libcli11-dev \
            qml6-module-qtqml qml6-module-qtqml-workerscript qml6-module-qtqml-models \
            qml6-module-qtquick qml6-module-qtquick-controls \
            qml6-module-qtquick-window qml6-module-qtquick-layouts \
            qml6-module-qtquick-templates qml6-module-qtquick-shapes
          echo "QT_ROOT_DIR=/usr/lib/x86_64-linux-gnu/qt6" >> "$GITHUB_ENV"

      - name: Build AppImage
        env:
          APPIMAGE_NAME: "ZowiDesktop-${{ steps.ver.outputs.version }}-x86_64.AppImage"
        run: bash packaging/linux/create-appimage.sh

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: build/ZowiDesktop-*.AppImage

  # ── Debian package for Lliurex 23 / Ubuntu 22.04 (jammy) ──
  deb-jammy:
    runs-on: ubuntu-22.04
    env:
      DISTRO_SUFFIX: jammy
    steps:
      - uses: actions/checkout@v4

      - name: Compute version from tag
        id: ver
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install system Qt6 and packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build pkg-config fakeroot debhelper devscripts dpkg-dev build-essential \
            qt6-base-dev qt6-declarative-dev qt6-connectivity-dev qt6-wayland libqt6opengl6-dev \
            qt6-tools-dev libbluetooth-dev libgl1-mesa-dev nlohmann-json3-dev libcli11-dev

      - name: Bump version to ${{ steps.ver.outputs.version }}
        env:
          DEBFULLNAME: GitHub Actions
          DEBEMAIL: actions@github.com
        run: |
          sed -i -E "s/VERSION [0-9]+\.[0-9]+\.[0-9]+/VERSION ${{ steps.ver.outputs.version }}/" CMakeLists.txt
          dch -v "${{ steps.ver.outputs.version }}-1+${DISTRO_SUFFIX}" -D unstable "Release ${{ steps.ver.outputs.version }}"

      - name: Build .deb
        run: bash packaging/linux/create-deb.sh

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-jammy
          path: build/zowi-desktop_*.deb

  # ── Debian package for Lliurex 25 / Ubuntu 24.04 (noble) ──
  deb-noble:
    runs-on: ubuntu-24.04
    env:
      DISTRO_SUFFIX: noble
    steps:
      - uses: actions/checkout@v4

      - name: Compute version from tag
        id: ver
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install system Qt6 and packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build pkg-config fakeroot debhelper devscripts dpkg-dev build-essential \
            qt6-base-dev qt6-declarative-dev qt6-connectivity-dev qt6-wayland libqt6opengl6-dev \
            qt6-tools-dev libbluetooth-dev libgl1-mesa-dev nlohmann-json3-dev libcli11-dev

      - name: Bump version to ${{ steps.ver.outputs.version }}
        env:
          DEBFULLNAME: GitHub Actions
          DEBEMAIL: actions@github.com
        run: |
          sed -i -E "s/VERSION [0-9]+\.[0-9]+\.[0-9]+/VERSION ${{ steps.ver.outputs.version }}/" CMakeLists.txt
          dch -v "${{ steps.ver.outputs.version }}-1+${DISTRO_SUFFIX}" -D unstable "Release ${{ steps.ver.outputs.version }}"

      - name: Build .deb
        run: bash packaging/linux/create-deb.sh

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-noble
          path: build/zowi-desktop_*.deb

  # ── Windows: portable zip + Inno Setup installer (MSVC x64) ──
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute version from tag
        id: ver
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtconnectivity'

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Configure CMake
        run: |
          cmake -S . -B build-win -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DZOWI_BUILD_CLI=ON

      - name: Build
        run: cmake --build build-win --config Release

      - name: Collect DLLs with windeployqt
        run: |
          New-Item -ItemType Directory -Path dist -Force
          windeployqt --qmldir src\views --dir dist build-win\src\gui\Release\ZowiDesktop.exe

      - name: Copy executables
        run: |
          Copy-Item build-win\src\gui\Release\ZowiDesktop.exe dist\
          Copy-Item build-win\src\cli\Release\zowi_cli.exe dist\ 2>$null

      - name: Create portable zip
        shell: bash
        run: |
          cd dist
          7z a "../ZowiDesktop-${{ steps.ver.outputs.version }}-windows-x86_64.zip" .

      - name: Build installer
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc /DVERSION=${{ steps.ver.outputs.version }} packaging\windows\installer\zowi-desktop.iss

      - name: Upload portable zip
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: ZowiDesktop-*-windows-x86_64.zip

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist-installer/ZowiDesktop-*-setup-x64.exe

  # ── Publish: GitHub Release + signed apt repo (jammy + noble) on gh-pages ──
  publish:
    needs: [appimage, deb-jammy, deb-noble, windows]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/appimage/ZowiDesktop-*.AppImage
            artifacts/deb-jammy/zowi-desktop_*.deb
            artifacts/deb-noble/zowi-desktop_*.deb
            artifacts/windows-portable/ZowiDesktop-*-windows-x86_64.zip
            artifacts/windows-installer/ZowiDesktop-*-setup-x64.exe
          generate_release_notes: true

      - name: Install aptly and GnuPG
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends aptly gnupg

      - name: Import GPG signing key
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Build signed apt repository (jammy + noble)
        env:
          APTLY_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          aptly repo create -distribution=jammy -component=main zowi-jammy
          aptly repo add zowi-jammy artifacts/deb-jammy/zowi-desktop_*.deb
          aptly publish repo -distribution=jammy zowi-jammy

          aptly repo create -distribution=noble -component=main zowi-noble
          aptly repo add zowi-noble artifacts/deb-noble/zowi-desktop_*.deb
          aptly publish repo -distribution=noble zowi-noble

      # ── The project website (docs/index.html + en/es/ca/fr/bg, images/,
      #    screenshots/) already lives in gh-pages/docs/ and is committed
      #    manually. We must NOT wipe the branch, so force_orphan is false and
      #    we only update the apt repo under docs/. The website files that are
      #    already on gh-pages are left untouched by this action. ──
      - name: Stage apt repo under docs/ (Pages serves the docs folder)
        run: |
          mkdir -p publish/docs
          cp -r ~/.aptly/public/dists publish/docs/
          cp -r ~/.aptly/public/pool publish/docs/
          gpg --export > publish/docs/keyring.gpg
          # Keep .nojekyll so GitHub does not run Jekyll on the Pages site.
          touch publish/.nojekyll

      - name: Publish apt repo to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: publish
          publish_branch: gh-pages
          force_orphan: false
          keep_files: true
          user_name: github-actions
          user_email: github-actions@github.com
