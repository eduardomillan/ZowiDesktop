<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zowi Desktop</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 80px 20px;
            color: #2d5a2d;
            background: #f4f9f4;
            line-height: 1.6;
            text-align: center;
        }
        h1 { color: #2d5a2d; font-size: 2.5em; margin-bottom: 10px; }
        p { font-size: 1.1em; opacity: 0.8; margin-bottom: 30px; }
        .lang-list { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; }
        .lang-list a {
            display: inline-block;
            padding: 12px 22px;
            background: #21a69b;
            color: #fff;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1.1em;
        }
        .lang-list a:hover { background: #17736c; }
    </style>
</head>
<body>
    <h1>Zowi Desktop</h1>
    <p>Select your language / Selecciona tu idioma / Selecciona el teu idioma / Choisissez votre langue / Изберете езика си</p>
    <div class="lang-list">
        <a href="en/">EN</a>
        <a href="es/">ES</a>
        <a href="ca/">CA</a>
        <a href="fr/">FR</a>
        <a href="bg/">BG</a>
    </div>

    <script>
        var lang = (navigator.language || navigator.userLanguage || '').slice(0, 2);
        var map = { en: 'en/', es: 'es/', ca: 'ca/', fr: 'fr/', bg: 'bg/' };
        if (map[lang]) window.location.replace(map[lang]);
    </script>
</body>
</html>
